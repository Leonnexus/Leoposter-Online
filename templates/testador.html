<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Leoposter - Laboratório de Testes</title>
    <style>
        body { margin: 0; padding: 0; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        header { background: #1e1e1e; padding: 15px; text-align: center; border-bottom: 2px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }
        header h2 { margin: 0; font-size: 20px; color: #f1c40f; }
        
        .grid-container { display: flex; flex: 1; width: 100%; height: calc(100vh - 50px); }
        
        .painel-host { flex: 1.5; border-right: 3px solid #333; display: flex; flex-direction: column; background: #000; }
        .painel-jogadores { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; overflow-y: auto; }
        
        .frame-container { display: flex; flex-direction: column; border-bottom: 3px solid #444; min-height: 650px; position: relative; }
        .frame-host { flex: 1; height: 100%; }
        
        h3 { margin: 0; text-align: center; font-size: 14px; color: #fff; background: #34495e; padding: 8px; border-bottom: 1px solid #222; text-transform: uppercase; letter-spacing: 1px; }
        iframe { width: 100%; height: 100%; border: none; background: #1c1c1c; }
    </style>
</head>
<body>
    <header>
        <h2>🧪 MODO DESENVOLVEDOR: 1 Host + 3 Jogadores Simultâneos</h2>
    </header>
    
    <div class="grid-container">
        <!-- TELA DA TV -->
        <div class="painel-host">
            <h3>🖥️ Tela Principal (Host)</h3>
            <div class="frame-host">
                <iframe src="/host"></iframe>
            </div>
        </div>
        
        <!-- COLUNA DE CELULARES -->
        <div class="painel-jogadores">
            <!-- As variáveis ?test_id= impedem que o cache de um jogador se misture com o do outro -->
            <div class="frame-container">
                <h3 style="background: #e74c3c;">📱 Jogador 1 (Cobáia A)</h3>
                <iframe src="/?test_id=1"></iframe>
            </div>
            <div class="frame-container">
                <h3 style="background: #2ecc71;">📱 Jogador 2 (Cobáia B)</h3>
                <iframe src="/?test_id=2"></iframe>
            </div>
            <div class="frame-container">
                <h3 style="background: #f39c12;">📱 Jogador 3 (Cobáia C)</h3>
                <iframe src="/?test_id=3"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
