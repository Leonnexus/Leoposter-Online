<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Leoposter - HOST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a1a; color: white; text-align: center; }
        .container { margin: 50px auto; width: 80%; max-width: 800px; }
        button { padding: 15px 30px; font-size: 20px; background-color: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px;}
        .codigo-gigante { font-size: 80px; letter-spacing: 15px; color: #f1c40f; font-weight: bold; }
        #painel-lobby, #painel-jogo { display: none; }
        .grid-config { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; background: #2b2b2b; padding: 20px; border-radius: 10px; margin-top: 20px; }
        select, input { padding: 10px; font-size: 16px; width: 100%; border-radius: 5px; box-sizing: border-box; }
        ul { list-style: none; padding: 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;}
        li { background: #333; padding: 10px 20px; border-radius: 8px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="container" id="painel-inicio">
        <h1 style="font-size: 50px; margin-bottom: 0;">L E O P O S T E R</h1>
        <p style="color: gray;">Modo Host de Controle</p>
        <button onclick="criarSala()">Criar Nova Partida</button>
    </div>

    <div class="container" id="painel-lobby">
        <div class="codigo-gigante" id="txt-codigo">----</div>
        <p>Acessem pelo celular e digitem o código. Jogadores (<span id="contagem">0</span>):</p>
        <ul id="lista-jogadores"></ul>

        <div class="grid-config">
            <div>
                <label>Tema da Rodada:</label>
                <select id="cfg-tema">
                    <option value="Aleatório">🎲 Aleatório</option>
                    <option value="Desenhos Famosos">Desenhos Famosos</option>
                    <option value="Personagens">Personagens</option>
                    <option value="Filmes de Sucesso">Filmes de Sucesso</option>
                    <option value="Marcas Famosas">Marcas Famosas</option>
                    <option value="Profissões">Profissões</option>
                    <option value="Comidas">Comidas</option>
                    <option value="Animais">Animais</option>
                </select>
            </div>
            <div>
                <label>Impostores Base:</label>
                <input type="number" id="cfg-imp" value="1" min="1">
            </div>
            <div>
                <label>Prob. Caos (%):</label>
                <input type="number" id="cfg-caos" value="10" min="0" max="100">
            </div>
            <div>
                <label>Prob. Trapaça (%):</label>
                <input type="number" id="cfg-trapaca" value="20" min="0" max="100">
            </div>
        </div>

        <button disabled id="btn-iniciar" style="background-color: gray;" onclick="iniciarPartida()">Aguardando Jogadores...</button>
    </div>

    <div class="container" id="painel-jogo">
        <h1 style="font-size: 60px; color: #e74c3c;">INTERROGATÓRIO</h1>
        <p style="font-size: 24px; color: gray;">Olhem para os seus celulares.</p>
        <p style="font-size: 20px;">Conversem, deem a sua palavra de dica e tentem achar o impostor.</p>
        </div>

    <script>
        const socket = io();
        let codigo_atual = "";

        function criarSala() {
            socket.emit('criar_sala');
        }

        socket.on('sala_criada_sucesso', (dados) => {
            codigo_atual = dados.codigo;
            document.getElementById('painel-inicio').style.display = 'none';
            document.getElementById('painel-lobby').style.display = 'block';
            document.getElementById('txt-codigo').innerText = codigo_atual;
        });

        socket.on('lista_jogadores_atualizada', (dados) => {
            const ul = document.getElementById('lista-jogadores');
            ul.innerHTML = '';
            dados.jogadores.forEach(nome => {
                const li = document.createElement('li');
                li.innerText = "👤 " + nome;
                ul.appendChild(li);
            });
            document.getElementById('contagem').innerText = dados.jogadores.length;
            
            const btn = document.getElementById('btn-iniciar');
            if (dados.jogadores.length >= 3) {
                btn.disabled = false;
                btn.style.backgroundColor = '#8e44ad';
                btn.innerText = "Iniciar Rodada";
            }
        });

        // Dispara o Cérebro do Python
        function iniciarPartida() {
            const config = {
                codigo: codigo_atual,
                categoria: document.getElementById('cfg-tema').value,
                imp_base: document.getElementById('cfg-imp').value,
                caos: document.getElementById('cfg-caos').value,
                trapaca: document.getElementById('cfg-trapaca').value
            };
            socket.emit('iniciar_partida', config);
        }

        // Quando o Python terminar de sortear e distribuir, ele avisa o Host
        socket.on('partida_iniciada_host', () => {
            document.getElementById('painel-lobby').style.display = 'none';
            document.getElementById('painel-jogo').style.display = 'block';
        });
    </script>
</body>
</html>
